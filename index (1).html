async function loadData(key, fallback) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : fallback; } catch { return fallback; }
}
async function saveData(key, val) { try { await window.storage.set(key, JSON.stringify(val)); } catch {} }

function today() { return new Date().toISOString().split("T")[0]; }
function uid() { return "x" + Math.random().toString(36).slice(2,10); }
function daysBetween(d1, d2) { return Math.floor((new Date(d2)-new Date(d1))/(1000*60*60*24)); }
function fmt(d) { if(!d) return "—"; const [y,m,dd]=d.split("-"); return `${dd}.${m}.${y}`; }

function exportCSV(activitati, clientMap, agentFilter) {
  const rows = activitati.filter(a => agentFilter==="Toți" || a.agent===agentFilter);
  const header = ["Client","Oraș","Agent","Servicii","Data","Status","Note"];
  const lines = rows.map(a => [
    clientMap[a.clientId]?.nume||"", clientMap[a.clientId]?.oras||"",
    a.agent, a.servicii.join("; "), a.data, a.status, a.note
  ].map(v=>`"${v}"`).join(","));
  const csv = [header.join(","),...lines].join("\n");
  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download="activitati_ssm.csv"; a.click();
  URL.revokeObjectURL(url);
}

function getCalendarDays(year, month) {
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  const startDow = (first.getDay()+6)%7;
  const days = [];
  for(let i=0;i<startDow;i++) days.push(null);
  for(let d=1;d<=last.getDate();d++) days.push(d);
  return days;
}

  function handleImportFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    setImportError("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const workbook = XLSX.read(data, {type:"array"});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});
        if(!rows.length) { setImportError("Fisierul este gol sau nu contine date."); return; }
        // detect columns case-insensitive
        const keys = Object.keys(rows[0]);
        const findKey = (...terms) => keys.find(k=>terms.some(t=>k.toLowerCase().includes(t)));
        const kNume = findKey("denumire","nume client","client","name","firma","companie");
        const kOras = findKey("oras","oraș","localitate","city","judet","județ");
        const kDomeniu = findKey("domeniu","activitate","tip","cod caen","caen");
        if(!kNume) { setImportError("Nu am gasit coloana cu numele firmei. Coloanele detectate: " + keys.join(", ")); return; }
        const parsed = rows.map(r=>({
          id: uid(),
          nume: String(r[kNume]||"").trim(),
          oras: kOras ? String(r[kOras]||"").trim() : "",
          domeniu: kDomeniu ? String(r[kDomeniu]||"").trim() : "",
        })).filter(r=>r.nume);
        if(!parsed.length) { setImportError("Nu am gasit niciun client valid in fisier."); return; }
        setImportPreview(parsed);
      } catch(err) { setImportError("Eroare la citirea fisierului: " + err.message); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value="";
  }

                <div style={{fontWeight:600,fontSize:13,marginBottom:10,color:"#374151"}}>+ Adaugă agent nou</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8}}>
                  <input style={S.formInput} placeholder="Nume agent" value={agentNou.nume} onChange={e=>setAgentNou(v=>({...v,nume:e.target.value}))}/>
                  <input type="password" style={S.formInput} placeholder="Parolă" value={agentNou.parola} onChange={e=>setAgentNou(v=>({...v,parola:e.target.value}))}/>
                  <button style={S.btn} onClick={()=>{
                    if(!agentNou.nume.trim()||!agentNou.parola.trim()){ showToast("Completează numele și parola!","err"); return; }
                    if(agentiList.includes(agentNou.nume.trim())){ showToast("Agentul există deja!","err"); return; }
                    setAgentiList(p=>[...p,agentNou.nume.trim()]);
                    setParoleMap(p=>({...p,[agentNou.nume.trim()]:agentNou.parola.trim()}));
                    setAgentNou({nume:"",parola:""}); showToast("Agent adăugat!");
                  }}>+ Adaugă</button>
                </div>
              </div>
            </div>

            {/* ── SERVICII ── */}
            <div style={{...S.card,maxWidth:560}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>🛠️ Servicii prestate</div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
                {servicii.map((s,i)=>(
                  <div key={s} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
                    <div style={{flex:1,fontSize:13,fontWeight:500,color:"#1a202c"}}>{s}</div>
                    <button
                      style={{...S.btnDanger,padding:"4px 10px",fontSize:12,opacity:servicii.length<=1?0.4:1}}
                      disabled={servicii.length<=1}
                      onClick={()=>{
                        if(confirm(`Ștergi serviciul "${s}"?`)){
                          setServicii(p=>p.filter(x=>x!==s));
                          showToast("Serviciu șters.");
                        }
                      }}>🗑️</button>
                  </div>
                ))}
              </div>
              <div style={{borderTop:"1px solid #e2e8f0",paddingTop:16}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:10,color:"#374151"}}>+ Adaugă serviciu nou</div>
                <div style={{display:"flex",gap:8}}>
                  <input style={{...S.formInput,flex:1}} placeholder="Ex: Medicina muncii, Audit SSM..." value={serviciiNou}
                    onChange={e=>setServiciiNou(e.target.value)}
                    onKeyDown={e=>{
                      if(e.key==="Enter"&&serviciiNou.trim()){
                        if(servicii.includes(serviciiNou.trim())){ showToast("Serviciul există deja!","err"); return; }
                        setServicii(p=>[...p.slice(0,-1), serviciiNou.trim(), p[p.length-1]]);
                        setServiciiNou(""); showToast("Serviciu adăugat!");
                      }
                    }}/>
                  <button style={S.btn} onClick={()=>{
                    if(!serviciiNou.trim()){ showToast("Introdu numele serviciului!","err"); return; }
                    if(servicii.includes(serviciiNou.trim())){ showToast("Serviciul există deja!","err"); return; }
                    setServicii(p=>[...p.slice(0,-1), serviciiNou.trim(), p[p.length-1]]);
                    setServiciiNou(""); showToast("Serviciu adăugat!");
                  }}>+ Adaugă</button>
                </div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:8}}>"Altele" rămâne întotdeauna la final.</div>
              </div>
            </div>
          </div>
        )}

      </div>
      {actModal&&(
        <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&setActModal(false)}>
          <div className="modal-inner" style={S.modal}>
            <div style={S.modalTitle}>{editId?"Editează activitate":"Activitate nouă"}</div>
            <div style={S.formGroup}>
              <label style={S.label}>Client *</label>
              <select style={S.formInput} value={actForm.clientId} onChange={e=>setActForm(f=>({...f,clientId:e.target.value}))}>
                <option value="">Selectează client...</option>
                {clienti.map(c=><option key={c.id} value={c.id}>{c.nume}</option>)}
              </select>
            </div>
            {isAdmin&&(
              <div style={S.formGroup}>
                <label style={S.label}>Agent *</label>
                <select style={S.formInput} value={actForm.agent} onChange={e=>setActForm(f=>({...f,agent:e.target.value}))}>
                  <option value="">Selectează agent...</option>
                  {agentiList.map(a=><option key={a}>{a}</option>)}
                </select>
              </div>
            )}
            <div style={S.formGroup}>
              <label style={S.label}>Servicii prestate *</label>
              <div className="chip-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {servicii.map(s=><div key={s} style={S.chip(actForm.servicii.includes(s))} onClick={()=>toggleServ(s)}>{s}</div>)}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={S.formGroup}>
                <label style={S.label}>Data *</label>
                <input type="date" style={S.formInput} value={actForm.data} onChange={e=>setActForm(f=>({...f,data:e.target.value}))}/>
              </div>
              <div style={S.formGroup}>
                <label style={S.label}>Status</label>
                <select style={S.formInput} value={actForm.status} onChange={e=>setActForm(f=>({...f,status:e.target.value}))}>
                  <option>Planificat</option>
                  <option>În progres</option>
                  <option>Finalizat</option>
                </select>
              </div>
            </div>
            <div style={S.formGroup}>
              <label style={S.label}>Metodă de plată</label>
              <div style={{display:"flex",gap:10}}>
                {["","Cash","OP"].map(opt=>(
                  <div key={opt} onClick={()=>setActForm(f=>({...f,plata:opt}))}
                    style={{flex:1,padding:"10px",borderRadius:9,border:`2px solid ${actForm.plata===opt&&opt?"#3b82f6":"#e2e8f0"}`,background:actForm.plata===opt&&opt?"#eff6ff":"#f8fafc",cursor:"pointer",textAlign:"center",fontSize:13,fontWeight:600,color:actForm.plata===opt&&opt?"#1e40af":"#94a3b8",transition:"all 0.15s"}}>
                    {opt===""?"Niciuna":opt==="Cash"?"💵 Cash":"🏦 OP"}
                  </div>
                ))}
              </div>
            </div>
            <div style={S.formGroup}>
              <label style={S.label}>Note</label>
              <textarea style={{...S.formInput,height:68,resize:"vertical"}} value={actForm.note} onChange={e=>setActForm(f=>({...f,note:e.target.value}))} placeholder="Observații..."/>
            </div>
            {(actForm.status==="Finalizat"||actForm.status==="În progres")&&!(actForm.servicii.length===1&&actForm.servicii[0]==="Închiriere Cabana Dangău")&&(
              <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"14px 16px",marginTop:4}}>
                <label style={{...S.label,color:"#1e40af",marginBottom:8}}>
                  📅 Următoarea vizită *
                  {!actForm.urmatoareaVizita&&<span style={{background:"#fee2e2",color:"#dc2626",borderRadius:6,padding:"2px 7px",fontSize:11,marginLeft:8,fontWeight:700}}>Obligatoriu</span>}
                </label>
                <input type="date" style={{...S.formInput,borderColor:!actForm.urmatoareaVizita?"#fca5a5":"#93c5fd",borderWidth:!actForm.urmatoareaVizita?2:1}}
                  value={actForm.urmatoareaVizita}
                  min={today()}
                  onChange={e=>setActForm(f=>({...f,urmatoareaVizita:e.target.value}))}/>
                {actForm.urmatoareaVizita?(
                  <div style={{fontSize:12,color:"#1e40af",marginTop:6,fontWeight:500}}>
                    ✅ Vizită programată pentru {fmt(actForm.urmatoareaVizita)} — va apărea în calendar și alerte.
                  </div>
                ):(
                  <div style={{fontSize:12,color:"#dc2626",marginTop:6,fontWeight:500}}>
                    ⚠️ Selectează data următoarei vizite pentru a putea salva.
                  </div>
                )}
              </div>
            )}
            <div style={S.modalActions}>
              <button style={S.btnOutline} onClick={()=>setActModal(false)}>Anulează</button>
              <button style={S.btn} onClick={saveAct}>Salvează</button>
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL IMPORT ── */}
      {importModal&&(
        <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&setImportModal(false)}>
          <div className="modal-inner" style={{...S.modal,maxWidth:560}}>
            <div style={S.modalTitle}>📥 Import clienți din Excel / CSV</div>
            {importPreview.length===0 ? (
              <>
                <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:"14px 16px",marginBottom:16,fontSize:13,color:"#0369a1"}}>
                  <strong>Cum funcționează:</strong><br/>
                  Exportă clienții din SmartBill ca Excel sau CSV, apoi încarcă fișierul aici. Aplicația detectează automat coloanele cu Denumire, Oraș și Domeniu. Duplicatele sunt ignorate automat.
                </div>
                {importError&&<div style={{background:"#fee2e2",color:"#dc2626",borderRadius:8,padding:"10px 12px",fontSize:13,marginBottom:12}}>{importError}</div>}
                <label style={{display:"block",border:"2px dashed #cbd5e1",borderRadius:12,padding:"32px",textAlign:"center",cursor:"pointer",background:"#f8fafc"}}>
                  <div style={{fontSize:28,marginBottom:8}}>📂</div>
                  <div style={{fontWeight:600,fontSize:14,color:"#374151"}}>Apasă pentru a selecta fișierul</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>Acceptă .xls, .xlsx sau .csv exportat din SmartBill</div>
                  <input type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={handleImportFile}/>
                </label>
                <div style={{marginTop:14,fontSize:12,color:"#94a3b8"}}>
                  <strong>Format acceptat:</strong> fișier CSV cu coloane Denumire / Client / Nume, opțional Oraș și Domeniu.
                </div>
              </>
            ) : (
              <>
                <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#166534"}}>
                  ✅ Am găsit <strong>{importPreview.length} clienți</strong> în fișier. Verifică lista și confirmă importul.
                </div>
                <div style={{maxHeight:280,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:10,marginBottom:14}}>
                  <table style={{...S.table,minWidth:"unset"}}>
                    <thead><tr>{["Firmă","Oraș","Domeniu"].map(h=><th key={h} style={{...S.th,fontSize:11}}>{h}</th>)}</tr></thead>
                    <tbody>
                      {importPreview.map((c,i)=>(
                        <tr key={i}>
                          <td style={{...S.td,fontSize:12,fontWeight:600}}>{c.nume}</td>
                          <td style={{...S.td,fontSize:12}}>{c.oras||"—"}</td>
                          <td style={{...S.td,fontSize:12}}>{c.domeniu||"—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>Clienții care există deja în aplicație vor fi ignorați automat.</div>
              </>
            )}
            <div style={S.modalActions}>
              <button style={S.btnOutline} onClick={()=>{setImportModal(false);setImportPreview([]);setImportError("");}}>Anulează</button>
              {importPreview.length>0&&<button style={S.btn} onClick={confirmImport}>✅ Confirmă importul</button>}
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL CLIENT ── */}
      {clientModal&&(
        <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&setClientModal(false)}>
          <div className="modal-inner" style={{...S.modal,maxWidth:400}}>
            <div style={S.modalTitle}>Client nou</div>
            {[["Nume firmă *","nume"],["Oraș","oras"],["Domeniu","domeniu"]].map(([lbl,key])=>(
              <div key={key} style={S.formGroup}>
                <label style={S.label}>{lbl}</label>
                <input style={S.formInput} value={clientForm[key]} onChange={e=>setClientForm(f=>({...f,[key]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&saveClient()}/>
              </div>
            ))}
            <div style={S.modalActions}>
              <button style={S.btnOutline} onClick={()=>setClientModal(false)}>Anulează</button>
              <button style={S.btn} onClick={saveClient}>Adaugă</button>
            </div>
          </div>
        </div>
      )}

      {/* ── TOAST ── */}
      {toast&&(
        <div style={S.toastWrap}>
          <div style={S.toastItem(toast.type)}>{toast.type==="err"?"❌":"✅"} {toast.msg}</div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/ssm-monitor1/service-worker.js');
      });
    }
  </script>
</body>
</html>
